<p>
    Chandrasekaran Joseph Vijay (born 22 June 1974) is an Indian politician and former actor who is currently serving as the ninth chief minister of Tamil Nadu since May 2026. He is the founder and president of the political party Tamilaga Vettri Kazhagam (TVK).
